name: Gravitas CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same branch when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Frontend — Next.js (client/)
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Points to client/package-lock.json, not the root
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # ESLint 9 flat config requires an explicit target — "eslint ." lints
        # the whole client directory. Matches "lint": "eslint ." in package.json.
        run: npm run lint

      - name: Type-check
        # Runs tsc without emitting files — catches type errors without a build
        run: npx tsc --noEmit

      - name: Run tests
        # --run exits after one pass. Without it Vitest enters watch mode
        # and the CI runner hangs indefinitely.
        run: npm run test -- --run

